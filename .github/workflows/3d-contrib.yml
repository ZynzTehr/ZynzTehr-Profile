# This workflow generates a 3D version of your GitHub contribution graph
name: Generate 3D GitHub Contribution Graph

# Define when this workflow should run
on:
  # Schedule it to run automatically at midnight UTC every day
  schedule:
    - cron: "0 0 * * *"
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    # The environment where the job will run
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    
    # Grant permissions needed to commit and push the generated files back to the repository
    permissions:
      contents: write
      
    steps:
      # Step 1: Check out the repository's code so the workflow can access it
      - uses: actions/checkout@v4
      
      # Step 2: Use a pre-built Action to generate the 3D contribution graph SVG files
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          # Use the repository's GitHub token for authentication
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Dynamically get your GitHub username
          USERNAME: ${{ github.repository_owner }}
          
      # Step 3: Commit the newly generated SVG files and push them back to the 'main' branch
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Generated 3D contribution graph"
          git push
